name: Recherche hebdomadaire de sources plus fraîches

# Job cloud GitHub qui, chaque semaine, vérifie si les autorités (ONSSA,
# NAFDAC, CDSCO...) ont publié une édition plus récente ou une base en ligne
# plus à jour que celle configurée. Les changements sûrs (même parseur, juste
# une URL plus récente) sont proposés en Pull Request — jamais fusionnés
# automatiquement. Voir scripts/research_sources.py pour le détail.
#
# DÉCLENCHEMENT AUTOMATIQUE DÉSACTIVÉ (2026-07-09) : nécessite des crédits
# payants sur l'API Claude (facturés séparément d'un abonnement Claude.ai),
# non disponibles pour l'instant. Reste utilisable manuellement
# (workflow_dispatch, bouton "Run workflow" sur GitHub) une fois des crédits
# ajoutés sur platform.claude.com. En attendant, l'équivalent gratuit tourne
# via une tâche planifiée Claude Code (app ouverte) — cf mémoire du projet.
on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: pip install . anthropic

      - name: Configurer git et gh
        run: |
          git config user.name "veille-lobs-bot"
          git config user.email "actions@github.com"
          echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      - name: Lancer l'agent de recherche
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -m scripts.research_sources
