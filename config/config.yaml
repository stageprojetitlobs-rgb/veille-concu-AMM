# Configuration centrale de la veille. Aucun secret ici (cf .env).

# Concurrents suivis. Le matching se fait en casefold + sans accents sur le nom
# du titulaire d'AMM (term-tit côté ANSES) et la raison sociale côté EMA.
# `aliases` couvre les variantes de raison sociale rencontrées dans les sources.
concurrents:
  - nom: Osalia
    aliases: [osalia]
    segments: [general]
  - nom: Axience
    aliases: [axience]
    segments: [general]
  - nom: Laprovet
    aliases: [laprovet, "la provet"]
    segments: [volaille, chiens, anti-infectieux, ape, vitamines]
  - nom: Kepro
    aliases: [kepro]
    segments: [general]
  - nom: Bimeda
    aliases: [bimeda, bimedavet, "bimeda france"]
    segments: [general]
  - nom: Inovet
    aliases: [inovet]
    segments: [volaille, chiens, anti-infectieux, ape]
  # ── Concurrents volaille ──────────────────────────────────────────────────
  - nom: Ceva
    aliases: [ceva, "ceva sante animale", "ceva santé animale", "ceva animal health"]
    segments: [volaille, ruminants, anti-infectieux, reproduction, trypanocides]
  - nom: Hipra
    aliases: [hipra, "laboratorios hipra"]
    segments: [volaille, chiens, ruminants]
  - nom: Intervet
    # Intervet = marque vétérinaire de MSD Animal Health.
    aliases: [intervet, "msd animal health", "msd sante animale", "msd santé animale", "schering-plough animal health"]
    segments: [volaille, chiens, ruminants]
  - nom: IZO-Novovet
    # IZO (ex-Novovet) — vaccins volaille France.
    aliases: [izo, novovet, "izo novovet", "laboratoires izo"]
    segments: [volaille]
  - nom: Boehringer-Ingelheim
    # BI a racheté Merial (Sanofi) en 2017 → les deux marques encore présentes dans les AMM.
    aliases: [boehringer, "boehringer ingelheim", "boehringer-ingelheim", merial, "merial sas", "bi animal health"]
    segments: [volaille, chiens, ruminants]
  - nom: Dechra
    aliases: [dechra, "dechra veterinary products", "dechra france"]
    segments: [volaille, chiens]
  - nom: Isra
    # ISRA — présent dans les tableaux concurrents Lobs (vaccins chiens + ruminants).
    # Aucun site web ni AMM trouvé — matching textuel uniquement.
    aliases: [isra, "laboratoire isra", "laboratoires isra", "isra lab"]
    segments: [chiens, ruminants, trypanocides]
  # ── Concurrents ruminants — instituts publics africains ──────────────────
  - nom: Labocel
    # Laboratoire Central de l'Élevage "Garoua" — Niger.
    aliases: [labocel, "laboratoire central elevage", "labocel niger"]
    segments: [ruminants]
  - nom: Lanavet
    # Laboratoire National Vétérinaire — Cameroun.
    aliases: [lanavet, "laboratoire national veterinaire", "lanavet cameroun"]
    segments: [ruminants]
  - nom: LCV-Mali
    # Laboratoire Central Vétérinaire du Mali — Bamako.
    aliases: [lcv, "lcv mali", "laboratoire central veterinaire mali", "laboratoire central veterinaire du mali"]
    segments: [ruminants]
  - nom: MCI
    # MCI Santé Animale — Mohammedia, Maroc. Leader vaccins ruminants Afrique du Nord.
    aliases: [mci, "mci sante animale", "mci santé animale", "mci pharma"]
    segments: [ruminants, anti-infectieux, trypanocides, vitamines]
  - nom: Institut-Pasteur-Dakar
    # Institut Pasteur de Dakar — Sénégal. Vaccins humains + vétérinaires (fièvre jaune, rage…).
    aliases: ["institut pasteur dakar", "pasteur dakar", "ipd", "ip dakar"]
    segments: [ruminants]
  - nom: KEVEVAPI
    # Kenya Veterinary Vaccines Production Institute — Nairobi, Kenya.
    aliases: [kevevapi, "kenya veterinary vaccines", "kenya veterinary vaccines production institute"]
    segments: [ruminants]
  - nom: BVI
    # Botswana Vaccine Institute — Gaborone, Botswana.
    aliases: [bvi, "botswana vaccine institute", "botswana vaccine"]
    segments: [ruminants]
  - nom: PANVAC
    # Pan African Veterinary Vaccine Centre — Debre Zeit, Éthiopie. Référence UA.
    aliases: [panvac, "pan african veterinary vaccine", "panvac ethiopia", "panvac ethiopie"]
    segments: [ruminants]
  # ── Concurrents anti-infectieux ──────────────────────────────────────────
  - nom: Kela
    # Kela Pharma — Belgique. Anti-infectieux vétérinaires.
    aliases: [kela, "kela pharma", "kela veterinaria"]
    segments: [anti-infectieux, ape, anti-inflammatoires, chiens, vitamines]
  - nom: VMD
    # VMD (Vlaamse Maatschappij voor Diergeneesmiddelen) — Belgique. Maison mère d'Inovet.
    aliases: [vmd, "vmd inovet", "vlaamse maatschappij voor diergeneesmiddelen"]
    segments: [anti-infectieux, ape, volaille, chiens]
  - nom: Alfasan
    # Alfasan International — Pays-Bas. Anti-infectieux + vitamines vétérinaires export.
    aliases: [alfasan, "alfasan international", "alfasan woerden"]
    segments: [anti-infectieux, api, ape, vitamines]
  - nom: Vetoquinol
    # Vétoquinol — Lure, France. Grand généraliste vétérinaire français.
    aliases: [vetoquinol, "vetoquinol sa", "vetoquinol france"]
    segments: [anti-infectieux, anti-inflammatoires, vitamines, chiens]
  - nom: Genevet
    # Genevet — anti-infectieux vétérinaires.
    aliases: [genevet, "laboratoires genevet", "laboratoire genevet"]
    segments: [anti-infectieux, ape, anti-inflammatoires, vitamines]
  - nom: Ashish-Life-Science
    # Ashish Life Science — Inde. Génériques vétérinaires export (Afrique, Moyen-Orient).
    # « sciences » au pluriel dans les registres NG/ZW ; « ashish » seul = mot distinctif.
    aliases: ["ashish life science", "ashish life sciences", "ashish lifescience", "ashish pharma", "ashish"]
    segments: [anti-infectieux, trypanocides, api]
  - nom: Dopharma
    # Dopharma — Pays-Bas. Anti-infectieux + antiparasitaires vétérinaires export.
    aliases: [dopharma, "dopharma research", "dopharma bv"]
    segments: [anti-infectieux, api]
  - nom: Huvepharma
    # Huvepharma — Bulgarie. Anti-infectieux + coccidiostatiques, fort sur l'export.
    aliases: [huvepharma, "huve pharma", "huvepharma ad"]
    segments: [anti-infectieux, api, reproduction]
  - nom: Interchemie
    # Interchemie — Pays-Bas. Anti-infectieux génériques vétérinaires.
    aliases: [interchemie, "interchemie werken"]
    segments: [anti-infectieux, api, anti-inflammatoires, reproduction]
  - nom: Agrar-Holland
    # Agrar Holland — Pays-Bas. Distribution + fabrication anti-infectieux export.
    aliases: ["agrar holland", "agrar-holland", agrarholland]
    segments: [anti-infectieux]
  - nom: Veko-Care
    # Veko Care — Pays-Bas/Belgique. Anti-infectieux vétérinaires export Afrique.
    aliases: ["veko care", "veko-care", vekocare]
    segments: [anti-infectieux, ape]
  # ── Concurrents trypanocides ─────────────────────────────────────────────
  - nom: MSD
    # MSD Animal Health (hors marque Intervet déjà couverte).
    aliases: [msd, "msd animal health", "merck sharp dohme", "msd sante animale"]
    segments: [trypanocides, anti-infectieux]
  - nom: ALM-International
    # ALM International — trypanocides vétérinaires export Afrique.
    aliases: ["alm international", "alm", "alm pharma"]
    segments: [trypanocides]
  - nom: Vicar
    # Vicar — trypanocides / anti-infectieux vétérinaires.
    aliases: [vicar, "vicar pharma", "laboratoire vicar", "laboratoires vicar"]
    segments: [trypanocides, anti-infectieux]
  - nom: ACT
    # ACT — trypanocides vétérinaires (Afrique, Moyen-Orient).
    aliases: [act, "act pharma", "act veterinaire", "act animal health"]
    segments: [trypanocides, ape]
  - nom: Livalth
    # Live.alth (Livalth) — santé animale export.
    aliases: ["live.alth", livalth, "liv alth", "livealth"]
    segments: [trypanocides]
  # ── Majors mondiaux ──────────────────────────────────────────────────────
  - nom: Virbac
    # Virbac — Carros, France. 2ème labo vétérinaire français, très fort Afrique/Maghreb.
    aliases: [virbac, "virbac sa", "virbac france", "virbac international"]
    segments: [volaille, chiens, ruminants, anti-infectieux, ape]
  - nom: Zoetis
    # Zoetis — N°1 mondial santé animale. Vaccins, anti-infectieux, antiparasitaires.
    aliases: [zoetis, "zoetis france", "zoetis inc", "pfizer animal health"]
    segments: [volaille, chiens, ruminants, anti-infectieux]
  - nom: Elanco
    # Elanco — N°2 mondial. A racheté Bayer Animal Health en 2020.
    aliases: [elanco, "elanco animal health", "bayer animal health", "elanco france"]
    segments: [volaille, chiens, ruminants, anti-infectieux]
  - nom: Norbrook
    # Norbrook — Irlande. Spécialiste génériques vétérinaires export Afrique.
    aliases: [norbrook, "norbrook laboratories", "norbrook pharma"]
    segments: [anti-infectieux, api]
  - nom: Calier
    # Calier — Espagne. Fort sur volaille et ruminants export Afrique/Moyen-Orient.
    aliases: [calier, "laboratorios calier", "calier sa"]
    segments: [volaille, ape]
  - nom: Phibro
    # Phibro Animal Health — USA. Leader coccidiostatiques volaille + anti-infectieux export.
    aliases: [phibro, "phibro animal health", "phibro ahc"]
    segments: [volaille, anti-infectieux]
  # ── Acteurs zones export (Afrique, Maghreb, Moyen-Orient) ────────────────
  - nom: Ourofino
    # Ourofino — Brésil. Montée en puissance en Afrique subsaharienne.
    aliases: [ourofino, "ourofino agronegocio", "ourofino saude animal"]
    segments: [ruminants, anti-infectieux]
  - nom: FATRO
    # FATRO — Italie. Anti-infectieux + vitamines export Afrique.
    aliases: [fatro, "fatro spa", "fatro italy"]
    segments: [anti-infectieux, vitamines]
  - nom: Chanelle
    # Chanelle Pharma — Irlande. Génériques vétérinaires export Afrique.
    aliases: [chanelle, "chanelle pharma", "chanelle veterinary"]
    segments: [anti-infectieux]
  - nom: Vetlima
    # Vetlima — Maroc. Concurrent direct de MCI sur Maghreb + Afrique de l'Ouest.
    aliases: [vetlima, "vetlima maroc", "laboratoire vetlima"]
    segments: [ruminants, anti-infectieux]

